<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LeetCode Accountability Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="settings-shell">
      <section class="settings-panel" aria-labelledby="settings-title">
        <h1 id="settings-title">LeetCode Accountability</h1>

        <form id="settings-form">
          <label for="leetcode-username">LeetCode username</label>
          <input
            id="leetcode-username"
            name="leetcodeUsername"
            type="text"
            autocomplete="username"
            required
          >

          <label for="discord-webhook-url">Discord webhook URL</label>
          <input
            id="discord-webhook-url"
            name="discordWebhookUrl"
            type="url"
            autocomplete="off"
            required
          >

          <label class="checkbox-field" for="include-problem-details">
            <input
              id="include-problem-details"
              name="includeProblemDetails"
              type="checkbox"
            >
            <span>Include problem title and difficulty when available</span>
          </label>

          <button type="submit">Save</button>
          <p id="status-message" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
